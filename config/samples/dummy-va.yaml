# Minimal dummy VariantAutoscaling to satisfy the controller
# This prevents "No active VariantAutoscalings found" log messages
# while doing minimal actual work (no real optimization since it's alone)
---
apiVersion: v1
kind: Namespace
metadata:
  name: wva-dummy
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dummy-deployment
  namespace: wva-dummy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dummy
  template:
    metadata:
      labels:
        app: dummy
    spec:
      containers:
      - name: pause
        image: registry.k8s.io/pause:3.9
        resources:
          requests:
            cpu: 1m
            memory: 1Mi
          limits:
            cpu: 1m
            memory: 1Mi
---
apiVersion: llmd.ai/v1alpha1
kind: VariantAutoscaling
metadata:
  name: dummy-va
  namespace: wva-dummy
  labels:
    inference.optimization/acceleratorName: dummy
spec:
  scaleTargetRef:
    kind: Deployment
    name: dummy-deployment
  modelID: "dummy/model"
