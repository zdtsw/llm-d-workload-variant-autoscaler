# Development values for workload-variant-autoscaler
# This file contains development-specific configurations with relaxed security settings

wva:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/llm-d/llm-d-workload-variant-autoscaler
    tag: latest
  imagePullPolicy: Always

  reconcileInterval: 30s

  modelName: ms-workload-autoscaler-llm-d-modelservice

  metrics:
    enabled: true
    port: 8443
    secure: true
  
  # Development logging configuration
  logging:
    level: debug  # Development: debug, Production: info
  prometheus:
    monitoringNamespace: openshift-user-workload-monitoring
    baseURL: "https://thanos-querier.openshift-monitoring.svc.cluster.local:9091"
    # Development security configuration (relaxed for easier development)
    tls:
      insecureSkipVerify: true   # Development: true, Production: false
      # On OpenShift, service CA is auto-injected at this path
      caCertPath: "/var/run/secrets/kubernetes.io/serviceaccount/service-ca.crt"
      # Mount existing Secret for CA certificate (recommended)
      # This eliminates the need for --set-file and certificate extraction
      existingSecret: ""      # Name of existing Secret (e.g., "prometheus-web-tls")
      key: "tls.crt"          # Name of the key in the Secret's data map containing the CA certificate (required when existingSecret is set)
    # caCert: |  # DEPRECATED: Use above existingSecret instead
    #   -----BEGIN CERTIFICATE-----
    #   YOUR_CA_CERTIFICATE_HERE
    #   -----END CERTIFICATE-----

  scaleToZero: false  # Enable scaling variants to zero replicas (default: false)

  # Saturation-based scaling configuration
  # These thresholds determine when replicas are saturated and when to scale up
  capacityScaling:
    # Global defaults applied to all variants unless overridden
    default:
      kvCacheThreshold: 0.80      # Replica saturated if KV cache utilization >= threshold (0.0-1.0)
      queueLengthThreshold: 5     # Replica saturated if queue length >= threshold
      kvSpareTrigger: 0.1         # Scale-up if avg spare KV capacity < trigger (0.0-1.0)
      queueSpareTrigger: 3        # Scale-up if avg spare queue capacity < trigger
    
    # Per-model/namespace overrides (optional)
    # Example:
    # overrides:
    #   llm-d:
    #     modelID: "Qwen/Qwen3-0.6B"
    #     namespace: "llm-d-autoscaler"
    #     kvCacheThreshold: 0.70
    #     kvSpareTrigger: 0.35
    overrides: {}

llmd:
  namespace: llm-d-autoscaler
  modelName: ms-workload-autoscaler-llm-d-modelservice
  modelID: "Qwen/Qwen3-0.6B"

  # scaleTargetKind: Optional. If not specified or empty, it will be set to "Deployment". 
  # Valid values are "Deployment", "LeaderWorkerSet" - case sensitive.
  #scaleTargetKind: "Deployment"
  
  # scaleTargetName: Name of the scale target resource.
  # For "Deployment": name of the Deployment.
  # For "LeaderWorkerSet": name of the LeaderWorkerSet.
  #scaleTargetName: 
  
va:
  enabled: true
  # accelerator: Optional. If not specified, it will be auto-discovered
  # from scale target. If specified, it will be used as fall-back value if it can't 
  # be discovered.
  accelerator: H100
  sloTpot: 10
  sloTtft: 1000
hpa:
  enabled: true
  # minReplicas: 0 for scale-to-zero testing (requires HPAScaleToZero feature gate)
  minReplicas: 0
  maxReplicas: 2
  targetAverageValue: "1"
vllmService:
  enabled: true
  nodePort: 30000
  interval: 15s
  scheme: http  # vLLM emulator runs on HTTP
